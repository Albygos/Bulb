<!-- Quick Timer (Frosted Glass) -->

<p class="text-[10px] font-bold text-slate-400 group-hover:text-primary uppercase tracking-tighter">Settings</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBQ_Zqh4RShWB-cqn-qgbVFD_jgEuTiVnY",
authDomain: "esp32-36fb9.firebaseapp.com",
databaseURL: "https://esp32-36fb9-default-rtdb.firebaseio.com",
projectId: "esp32-36fb9",
storageBucket: "esp32-36fb9.firebasestorage.app",
messagingSenderId: "502009162404",
appId: "1:502009162404:web:5b531d92582c1e61be1431"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let bulbState="OFF"
let timerOn=0
let timerOff=0

const statusText=document.getElementById("deviceStatus")

const onPicker=document.getElementById("onTimePicker")
const offPicker=document.getElementById("offTimePicker")

// READ BULB STATE

onValue(ref(db,"device/bulb/state"),(snap)=>{

bulbState=snap.val()

statusText.innerText = bulbState==="ON" ? "Device is On" : "Device is Off"

const btn = document.getElementById("powerBtn")

if(bulbState==="ON"){

btn.classList.remove("bg-gray-400","shadow-none")
btn.classList.add("bg-primary","shadow-lg","shadow-primary/30")

}else{

btn.classList.remove("bg-primary","shadow-lg","shadow-primary/30")
btn.classList.add("bg-gray-400","shadow-none")

}

})

// READ TIMER ON

onValue(ref(db,"device/bulb/timerOn"),(snap)=>{

timerOn=snap.val() || 0

if(timerOn>0){

let d=new Date(timerOn*1000)

let h=d.getHours()
let m=d.getMinutes()

let ampm=h>=12?"PM":"AM"

h=h%12
if(h==0)h=12

document.getElementById("onTimeText").innerText=
`${h}:${m.toString().padStart(2,'0')}`

document.getElementById("onAmpm").innerText=ampm

}

})

// READ TIMER OFF

onValue(ref(db,"device/bulb/timerOff"),(snap)=>{

timerOff=snap.val() || 0

if(timerOff>0){

let d=new Date(timerOff*1000)

let h=d.getHours()
let m=d.getMinutes()

let ampm=h>=12?"PM":"AM"

h=h%12
if(h==0)h=12

document.getElementById("offTimeText").innerText=
`${h}:${m.toString().padStart(2,'0')}`

document.getElementById("offAmpm").innerText=ampm

}

})

// TOGGLE BULB

window.toggleBulb=function(){

if(bulbState==="ON"){
set(ref(db,"device/bulb/state"),"OFF")
}else{
set(ref(db,"device/bulb/state"),"ON")
}

}

// OPEN TIME PICKERS

window.pickOnTime=function(){
onPicker.click()
}

window.pickOffTime=function(){
offPicker.click()
}

// SAVE ON TIMER

onPicker.addEventListener("change",(e)=>{

let now = new Date()
let [h,m] = e.target.value.split(":")

now.setHours(h)
now.setMinutes(m)
now.setSeconds(0)

let ts = Math.floor(now.getTime()/1000)

set(ref(db,"device/bulb/timerOn"),ts)

})

// SAVE OFF TIMER

offPicker.addEventListener("change",(e)=>{

let now = new Date()
let [h,m] = e.target.value.split(":")

now.setHours(h)
now.setMinutes(m)
now.setSeconds(0)

let ts = Math.floor(now.getTime()/1000)

set(ref(db,"device/bulb/timerOff"),ts)

})

// TIMER EXECUTION

setInterval(()=>{

let now=Math.floor(Date.now()/1000)

if(timerOn>0 && now>=timerOn){

set(ref(db,"device/bulb/state"),"ON")
set(ref(db,"device/bulb/timerOn"),0)

}

if(timerOff>0 && now>=timerOff){

set(ref(db,"device/bulb/state"),"OFF")
set(ref(db,"device/bulb/timerOff"),0)

}

},1000)

</script>
